<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>NBA Teams</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css">

  <body>
    <div class="wrapper">
      <!-- row 1, 4 individual boxes -->

          <p>The Los Angeles Lakers</p>
          <p><a href="https://www.nba.com/lakers" target="_blank">Read more &gt;&gt;</a></p>
        </article>
        <article class="col-1">
          <h3>Clippers</h3>
          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/e/ed/Los_Angeles_Clippers_%282024%29.svg/500px-Los_Angeles_Clippers_%282024%29.svg.png" alt="LA Clippers logo">
          <p>The Los Angeles Clippers.</p>
          <p><a href="https://www.nba.com/clippers" target="_blank">Read more &gt;&gt;</a></p>
        </article>
        <article class="col-1">

          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/01/Golden_State_Warriors_logo.svg/250px-Golden_State_Warriors_logo.svg.png" alt="Golden State Warriors logo">

          <p><a href="https://www.nba.com/warriors" target="_blank">Read more &gt;&gt;</a></p>
        </article>
        <article class="col-1">
          <h3>Celtics</h3>
          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8f/Boston_Celtics.svg/250px-Boston_Celtics.svg.png" alt="Boston Celtics logo">

          <p><a href="https://www.nba.com/celtics" target="_blank">Read more &gt;&gt;</a></p>
        </article>
      </div>
      <!-- row 2, 2 boxes spanning 2 rows -->
      <div class="row">
        <article class="col-2">
          <h3>Heat</h3>
          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/fb/Miami_Heat_logo.svg/250px-Miami_Heat_logo.svg.png" alt="Miami Heat logo">
          <p>The Miami Heat.</p>
          <p><a href="https://www.nba.com/heat" target="_blank">Read more &gt;&gt;</a></p>
        </article>
        <article class="col-2">
          <h3>Bulls</h3>
          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/6/67/Chicago_Bulls_logo.svg/250px-Chicago_Bulls_logo.svg.png" alt="Chicago Bulls logo">
          <p>The Chicago Bulls.</p>
          <p><a href="https://www.nba.com/bulls" target="_blank">Read more &gt;&gt;</a></p>
        </article>
      </div>
      <!-- row 3: narrow left column, wide right/content column -->
      <div class="row">

      </div>
      <!-- row 4: one column -->
      <div class="row">

      </div>
      <!-- row 5, 1-2-1 individual boxes -->
      <div class="row">
      </div>

</html>
